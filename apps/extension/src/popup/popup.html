<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      min-height: 200px;
      background: #fafafa;
      color: #1a1a1a;
    }
    .header {
      background: #16a34a;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.85; }
    .section-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 4px; }
    .body { padding: 16px; }
    .status-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .status-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-value { font-size: 14px; font-weight: 500; margin-top: 2px; }
    .status-value.connected { color: #16a34a; }
    .status-value.disconnected { color: #dc2626; }
    .status-value.syncing { color: #d97706; }
    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #16a34a; color: white; margin-bottom: 8px; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .error { color: #dc2626; font-size: 12px; margin-top: 8px; }
    .step { font-size: 12px; color: #6b7280; margin-top: 8px; }
    .last-synced { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🛒 Grocery Tracker</h1>
      <p>Swiggy &amp; Blinkit Sync</p>
    </div>
  </div>
  <div class="body">
    <div class="status-card">
      <div class="status-label">Status</div>
      <div class="status-value" id="status">Loading...</div>
      <div class="last-synced" id="last-synced"></div>
    </div>
    <p class="section-label">Sync orders</p>
    <button class="btn btn-primary" id="sync-swiggy-btn">🛒 Sync from Swiggy Instamart</button>
    <button class="btn btn-primary" id="sync-blinkit-btn" style="background:#f97316;margin-bottom:8px;">🟠 Sync from Blinkit</button>
    <button class="btn btn-secondary" id="connect-btn">Connect Account</button>
    <p class="error" id="error"></p>
    <p class="step" id="step"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
